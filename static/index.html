<!doctype html>
<html>
  <body>
    <h1>Tiny site</h1>
    <button onclick="loadMessages()">Call backend</button>
    <pre id="out"></pre>

    <script>
      async function loadMessages() {
        const res = await fetch("/api/grab/");
        const data = await res.json();
        document.getElementById("out").append(data.message);
      }
    </script>
  </body>
</html>
